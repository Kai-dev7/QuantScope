version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - quantscope

  backend:
    image: quantscope/backend:latest
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/quantscope
      - REDIS_URI=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - quantscope

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - quantscope

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quantscope

volumes:
  mongo_data:
  redis_data:

networks:
  quantscope:
    driver: bridge
