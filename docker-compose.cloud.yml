# QuantScope Cloud Deployment - docker-compose for Tencent Cloud
# 用法: docker-compose -f docker-compose.cloud.yml up -d
#
# 架构说明:
#   - MongoDB: Docker 容器 (mongo:7)，端口映射到宿主机
#   - Redis: 宿主机本地 redis-server（已安装）
#   - 后端: 本容器运行，使用 host 网络模式访问 MongoDB/Redis
#
# 依赖外部服务（需提前配置）:
#   1. 宿主机 redis-server (apt-get install redis-server && redis-server --daemonize yes)
#   2. 环境变量文件 .env.cloud

version: '3.8'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: quantscope-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --auth --bind_ip localhost
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: tradingagents123
      MONGO_INITDB_DATABASE: tradingagents
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

  # ── 后端服务 ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: quantscope-backend:v1.0.0-cloud
    container_name: quantscope-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env.cloud
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Shanghai"
      # 日志
      TRADINGAGENTS_LOG_LEVEL: INFO
      TRADINGAGENTS_LOG_DIR: /app/logs
      # Redis 连接到宿主机
      TRADINGAGENTS_REDIS_URL: redis://:tradingagents123@host.docker.internal:6379
      TRADINGAGENTS_CACHE_TYPE: redis
      # 云端标识
      DOCKER_CONTAINER: "true"
      # 后端监听地址
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    network_mode: host
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

  # ── 前端静态服务 ─────────────────────────────────────────────────────
  # 如果不想单独装 Nginx，可以用这个容器提供前端静态文件
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    image: quantscope-frontend:v1.0.0-cloud
    container_name: quantscope-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./frontend-react/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    profiles:
      - frontend-only

# 数据卷
volumes:
  mongodb_data:
    driver: local

# 网络：使用 host 模式，不需要额外网络配置