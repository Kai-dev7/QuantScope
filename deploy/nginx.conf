# QuantScope 生产环境 Nginx 配置
# 路径: /etc/nginx/sites-available/quantscope
# 需要: certbot --nginx 自动填充 SSL 证书路径

# ── HTTP → HTTPS 重定向 ───────────────────────────────────
server {
    listen 80;
    server_name app.510168.xyz api.510168.xyz;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主站 ───────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.510168.xyz api.510168.xyz;

    # ═══════════════════════════════════════════════════════
    # SSL 证书（certbot --nginx 自动填充）
    # ═══════════════════════════════════════════════════════
    ssl_certificate /etc/letsencrypt/live/app.510168.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.510168.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ═══════════════════════════════════════════════════════
    # 安全 headers
    # ═══════════════════════════════════════════════════════
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ═══════════════════════════════════════════════════════
    # 日志
    # ═══════════════════════════════════════════════════════
    access_log /var/log/nginx/quantscope_access.log;
    error_log /var/log/nginx/quantscope_error.log;

    # ═══════════════════════════════════════════════════════
    # Gzip 压缩
    # ═══════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/xml+rss application/atom+xml image/svg+xml;

    # ═══════════════════════════════════════════════════════
    # 前端静态文件根目录
    # ═══════════════════════════════════════════════════════
    root /opt/QuantScope/frontend-react/dist;
    index index.html;

    # ═══════════════════════════════════════════════════════
    # API 反向代理（FastAPI 后端）
    # ═══════════════════════════════════════════════════════
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 分析任务可能跑很久（40分钟深度分析）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;

        # 增大 body 大小限制（报告可能较大）
        proxy_request_buffering off;
        client_max_body_size 50m;
    }

    # ═══════════════════════════════════════════════════════
    # MCP 端点（StreamableHTTP + SSE）
    # ═══════════════════════════════════════════════════════
    location /mcp/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # MCP session + 分析任务需要较长超时
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_connect_timeout 60s;

        # MCP 需要的 header
        proxy_set_header Accept "application/json, text/event-stream";
        proxy_hide_header "Cache-Control";
    }

    # ═══════════════════════════════════════════════════════
    # WebSocket 支持（实时分析进度）
    # ═══════════════════════════════════════════════════════
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 可能长时间连接
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 关闭缓冲
        proxy_buffering off;
        proxy_flush on;
    }

    # ═══════════════════════════════════════════════════════
    # 健康检查（供外部监控）
    # ═══════════════════════════════════════════════════════
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        access_log off;
    }

    # ═══════════════════════════════════════════════════════
    # 前端静态资源缓存（静态资产）
    # ═══════════════════════════════════════════════════════
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ═══════════════════════════════════════════════════════
    # 静态目录（assets）
    # ═══════════════════════════════════════════════════════
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ═══════════════════════════════════════════════════════
    # index.html 不缓存（确保加载最新前端）
    # ═══════════════════════════════════════════════════════
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # ═══════════════════════════════════════════════════════
    # SPA fallback（所有路径先尝试文件，不存在则回退 index.html）
    # ═══════════════════════════════════════════════════════
    location / {
        try_files $uri $uri/ /index.html;
    }
}